<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Housing Project - 172 Plots</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .container {
            display: grid;
            grid-template-rows: repeat(6, auto); /* ৬টি সারি */
            grid-auto-flow: column; /* বাম থেকে ডানে */
            gap: 15px; /* বাটনের মাঝে ফাঁকা */
            justify-content: center;
        }

        .plot-btn {
            width: 65px;
            height: 45px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .plot-btn:hover {
            background-color: #2c80b4;
            transform: scale(1.08);
        }
    </style>
</head>

<body>

    <h1>Housing Project - 172 Plots</h1>

    <div class="container" id="plotContainer"></div>

    <script>
        const container = document.getElementById("plotContainer");

        for (let i = 1; i <= 172; i++) {
            const button = document.createElement("button");
            button.className = "plot-btn";
            button.innerText = i;
            container.appendChild(button);
        }
    </script>

</body>
</html>
